services:
  # 1. Backend Web Service
  - type: web
    name: taskflow-backend
    env: node
    plan: free
    rootDir: apps/server
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: VAPID_SUBJECT
        value: mailto:support@taskflow.dev
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false

  # 2. Frontend Static Site
  - type: web
    name: taskflow-frontend
    env: static
    plan: free
    rootDir: apps/client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: taskflow-backend
          property: url

databases:
  # 3. Database PostgreSQL
  - name: taskflow-db
    plan: free
    databaseName: taskflow
    user: taskflow_admin
